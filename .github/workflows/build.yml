name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build on Linux
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Create release archive
        run: |
          cd build/src
          tar -cvzf ../../goblin-dice-rollaz-linux.tar.gz goblin-doom goblin-setup goblin-server

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: goblin-dice-rollaz-linux.tar.gz

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t goblin-dice-rollaz:latest .

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          choco install cmake sdl2 sdl2-mixer sdl2-net libpng -y

      - name: Build on Windows
        run: |
          mkdir build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            build/src/Release/goblin-doom.exe
            build/src/Release/goblin-setup.exe
