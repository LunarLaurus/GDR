name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build on Linux
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          cmake --build . -j$(nproc)

      - name: Create release archive
        run: |
          cd build/src
          tar -cvzf ../../goblin-dice-rollaz-linux.tar.gz goblin-doom goblin-setup goblin-server

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: goblin-dice-rollaz-linux.tar.gz

  build-docker:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: linux-build

      - name: Build Docker image
        run: docker build -t goblin-dice-rollaz:latest .

      - name: Test Docker build
        run: docker run --rm goblin-dice-rollaz:latest --version

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libsdl2-dev libsdl2-mixer-dev libsdl2-net-dev libpng-dev
          version: 1.0

      - name: Build on Windows
        run: |
          mkdir build
          cmake .. -G "Unix Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/src/Release/*.exe
